<svg width="100%" viewBox="0 0 680 348" role="img" xmlns="http://www.w3.org/2000/svg"><title>The midterm sliced into five pull requests</title><desc>Five pull requests. PR A is a standalone continuous-integration foundation, independent of the rest. PRs B and C are prerequisites whose arrows converge into PR D, the activation switch, which points on to PR E, the LOPART oracle that is the midterm payoff.</desc><style>:root{--text-secondary:#7a8088}.th{font:700 15px system-ui,sans-serif;fill:#fff}.ts{font:12px system-ui,sans-serif;fill:#6c727a}rect.c-gray,.c-gray rect{fill:#6b7280}rect.c-teal,.c-teal rect{fill:#1c9e76}.c-gray .ts,.c-teal .ts{fill:rgba(255,255,255,.85)}</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><line x1="230" y1="177" x2="296" y2="210" stroke="var(--text-secondary)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/><line x1="230" y1="267" x2="296" y2="234" stroke="var(--text-secondary)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/><line x1="450" y1="222" x2="496" y2="222" stroke="var(--text-secondary)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/><g class="c-gray"><rect x="60" y="52" width="170" height="52" rx="8"/><text class="th" x="145" y="74" text-anchor="middle">PR A</text><text class="ts" x="145" y="92" text-anchor="middle">CI · independent</text></g><g class="c-teal"><rect x="60" y="150" width="170" height="54" rx="8"/><text class="th" x="145" y="172" text-anchor="middle">PR B</text><text class="ts" x="145" y="190" text-anchor="middle">rule API (R)</text></g><g class="c-teal"><rect x="60" y="240" width="170" height="54" rx="8"/><text class="th" x="145" y="262" text-anchor="middle">PR C</text><text class="ts" x="145" y="280" text-anchor="middle">C++ plumbing</text></g><g class="c-teal"><rect x="300" y="195" width="150" height="54" rx="8"/><text class="th" x="375" y="217" text-anchor="middle">PR D</text><text class="ts" x="375" y="235" text-anchor="middle">activation</text></g><g class="c-teal"><rect x="500" y="195" width="140" height="54" rx="8"/><text class="th" x="570" y="217" text-anchor="middle">PR E</text><text class="ts" x="570" y="235" text-anchor="middle">LOPART oracle</text></g><rect class="c-gray" x="60" y="312" width="14" height="14" rx="3"/><text class="ts" x="82" y="323">independent of the chain</text><rect class="c-teal" x="260" y="312" width="14" height="14" rx="3"/><text class="ts" x="282" y="323">stacked: B, C → D → E</text></svg>
